<style>
:root{

*{box-sizing:border-box}

body{min-height:100vh;}

.tabs{display:flex; overflow-x:auto; gap:8px; padding:12px 0 4px; scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{border:1px solid var(--line); color:var(--text); background:#0d1a2f; padding:9px 12px; border-radius:999px; font-weight:700; white-space:nowrap; cursor:pointer}

main{max-width:1200px; margin:0 auto; padding:16px 12px 84px}.view{display:none}.view.active{display:block}.grid{display:grid; gap:12px}.cards{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}.card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow)}
.kpi{font-size:25px; font-weight:900}.label{color:var(--muted); font-size:12px; margin-top:3px}.section-title{font-size:18px; font-weight:900; margin:18px 0 10px}.row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}.spaced{justify-content:space-between}.pill{display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:800; border:1px solid var(--line); color:var(--text); background:#0d1a2f}.pill.green{background:rgba(25,166,90,.18); border-color:rgba(25,166,90,.55)}.pill.yellow{background:rgba(255,193,7,.18); border-color:rgba(255,193,7,.55); color:#ffe8a3}.pill.red{background:rgba(232,80,91,.18); border-color:rgba(232,80,91,.55)}.pill.blue{background:rgba(47,128,237,.18); border-color:rgba(47,128,237,.55)}

input,select{background:var(--input); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px; outline:none}input:focus,select:focus{border-color:var(--primary2); box-shadow:0 0 0 3px rgba(22,129,196,.16)}.score{width:58px; text-align:center; font-weight:900}.team-edit{width:100%; margin-top:6px}.filters{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px}.filters input{grid-column:1 / -1}.match-list{display:grid; gap:12px}.match-card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:13px; box-shadow:var(--shadow)}.match-head{display:flex; justify-content:space-between; gap:8px; align-items:flex-start; color:var(--muted); font-size:12px}.teams{display:grid; gap:9px; margin:10px 0}.team-row{display:grid; grid-template-columns:minmax(0,1fr) 58px 58px; gap:7px; align-items:center}.team-name{font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}.team-name.winner{color:#8ff0b7}.score-label{font-size:10px; color:var(--muted); text-align:center}.venue{font-size:12px; color:var(--muted); margin-top:6px}.small{font-size:12px; color:var(--muted)}
.group-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px}.group-card{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow)}.group-title{background:linear-gradient(135deg,#0f4c81,#1681c4); padding:11px 13px; font-weight:900}.table-wrap{overflow-x:auto}table{width:100%; border-collapse:collapse; font-size:13px}th,td{padding:8px 7px; border-bottom:1px solid var(--line); text-align:center}th{color:#dceaff; background:#0d1a2f; font-size:11px}td.team{text-align:left; font-weight:800}.rank1,.rank2{background:rgba(25,166,90,.12)}.rank3{background:rgba(255,193,7,.13)}.rank4{background:rgba(232,80,91,.10)}
.third-table td,.third-table th{padding:9px}.qualified{color:#8ff0b7; font-weight:900}.not-qualified{color:#ff9ea7; font-weight:900}
/* v16 prueba: eliminaciГіn matemГЎtica por escenarios, solo mediante colores */

.table-neutral{background:transparent}
.top-info-symbol{font-size:22px;line-height:1;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}

.bracket{display:flex; gap:12px; overflow-x:auto; padding-bottom:12px; align-items:flex-start}.round{min-width:252px; display:grid; gap:10px}.round-title{font-size:14px; font-weight:900; color:#dceaff; padding:4px 2px}.bracket-match{background:var(--card); border:1px solid var(--line); border-left:5px solid var(--primary2); border-radius:14px; padding:10px; min-height:105px}.bracket-team{display:flex; justify-content:space-between; gap:8px; padding:5px 0; border-bottom:1px dashed rgba(255,255,255,.08)}.bracket-team:last-child{border-bottom:0}.bracket-team .name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}.champion{background:linear-gradient(135deg,rgba(255,193,7,.20),rgba(25,166,90,.18)); border:1px solid rgba(255,193,7,.5)}
.notice{border-left:5px solid var(--yellow); background:rgba(255,193,7,.12); padding:12px; border-radius:12px; color:#ffe8a3}.ok{border-left-color:var(--green); background:rgba(25,166,90,.12); color:#c5f5d8}.footer-bar{position:fixed; bottom:0; left:0; right:0; z-index:9; background:rgba(11,18,32,.96); border-top:1px solid var(--line); padding:10px 12px}.footer-inner{max-width:1200px; margin:auto; display:flex; gap:8px; overflow-x:auto}.footer-inner button{white-space:nowrap}.empty{padding:18px; text-align:center; color:var(--muted)}.jump-card{cursor:pointer; transition:transform .12s ease, border-color .12s ease; border-color:rgba(47,128,237,.65)}.jump-card:active{transform:scale(.99)}.match-card.jump-target{outline:3px solid var(--yellow); box-shadow:0 0 0 7px rgba(255,193,7,.18), var(--shadow)}
.hero{display:grid; gap:14px; grid-template-columns:76px 1fr; align-items:center; background:radial-gradient(circle at 10% 15%,rgba(255,193,7,.22),transparent 28%),linear-gradient(135deg,#10223b,#0b1220 62%,#063b2b); border:1px solid rgba(255,193,7,.30); border-radius:22px; padding:14px; box-shadow:var(--shadow); margin-bottom:14px}.hero img{width:76px;height:76px;border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,.35)}.hero h2{margin:0;font-size:21px}.hero .subtitle{font-size:13px}.mini-kpi{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}.quick-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px}.quick-row button{white-space:nowrap}.status-pending{border-left-color:var(--blue)}.status-played{border-left-color:var(--green)}.status-overdue{border-left-color:var(--red)}.fav-btn{background:transparent; border:1px solid var(--line); box-shadow:none; padding:6px 8px; border-radius:10px; min-width:38px}.fav-btn.active{background:rgba(255,193,7,.20); border-color:rgba(255,193,7,.65); color:#ffe8a3}.team-click{cursor:pointer}.team-click:hover{text-decoration:underline}.note-box{width:100%; min-height:44px; resize:vertical; background:var(--input); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px; font-family:inherit}.match-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}.warning-card{border-color:rgba(232,80,91,.55); background:rgba(232,80,91,.10)}.team-summary{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px}.summary-num{font-size:24px; font-weight:900}.bottom-nav{position:fixed; bottom:70px; left:12px; right:12px; max-width:560px; margin:auto; display:flex; gap:6px; justify-content:center; z-index:8; pointer-events:none}.bottom-nav button{pointer-events:auto; padding:8px 10px; border-radius:999px; font-size:12px; background:#15233a; box-shadow:0 8px 22px rgba(0,0,0,.28)}.bottom-nav button.active{background:var(--primary2)}@media (max-width:520px){.footer-bar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}.footer-inner button{font-size:12px; padding:9px}.hero{grid-template-columns:62px 1fr}.hero img{width:62px;height:62px;border-radius:16px}.hero h2{font-size:18px}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.card{padding:12px}.kpi{font-size:22px}.match-actions button{flex:1}.filters{grid-template-columns:1fr}.team-row{grid-template-columns:minmax(0,1fr) 54px 54px}.score{width:54px}}

@media (min-width:700px){h1{font-size:24px}.filters{grid-template-columns:1fr 180px 180px}.filters input{grid-column:auto}.team-row{grid-template-columns:minmax(0,1fr) 64px 64px}.score{width:64px}.header-inner{padding-left:18px; padding-right:18px}main{padding:20px 18px 92px}}

/* v8: enlaces ViX externos con vix_links.json */
.search-helper{grid-column:1 / -1; display:flex; gap:8px; align-items:center; flex-wrap:wrap; min-height:0; margin-top:-2px}
.suggestion-chip{border:1px solid rgba(255,193,7,.55); color:#ffe8a3; background:rgba(255,193,7,.14); border-radius:999px; padding:6px 9px; font-size:12px; font-weight:800; cursor:pointer}
.compact-actions{margin-top:10px; border-top:1px solid rgba(255,255,255,.08); padding-top:8px}
.compact-actions summary{cursor:pointer; color:var(--muted); font-size:12px; font-weight:800; list-style:none; display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); padding:7px 9px; border-radius:999px; background:#0d1a2f}
.compact-actions summary::-webkit-details-marker{display:none}
.compact-actions[open] summary{color:#dceaff; border-color:rgba(47,128,237,.55)}
.compact-actions .action-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:9px}
.compact-actions button{font-size:12px; padding:8px 10px; box-shadow:none}
.vix-btn{background:#5b2bbf!important}
.vix-search-btn{background:#263653!important}
.home-card-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
.home-card-actions button{font-size:12px; padding:8px 10px; box-shadow:none}
@media (max-width:520px){.compact-actions .action-row button{flex:1}.home-card-actions button{flex:1}.search-helper{font-size:12px}}


/* v9: modo claro/oscuro y calendario */
.header-tools{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-top:8px}
.theme-toggle{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:8px 12px;font-weight:800;cursor:pointer}
.calendar-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.calendar-toolbar select{min-width:210px}
.calendar-list{display:grid;gap:10px}
.calendar-match{display:grid;grid-template-columns:76px 1fr auto;gap:10px;align-items:center;cursor:pointer}
.calendar-time{font-weight:900;color:var(--primary2);font-size:15px}
.calendar-teams{font-weight:900}
.calendar-meta{font-size:12px;color:var(--muted);margin-top:3px}
.calendar-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.today-badge{background:rgba(25,166,90,.18);border:1px solid rgba(25,166,90,.45);color:#b9ffd8}
body.light{
  --bg:#f4f7fb; --card:#ffffff; --card2:#f8fbff; --text:#132238; --muted:#53667f;
  --line:#d8e2ef; --input:#ffffff; --shadow:0 8px 22px rgba(15,35,64,.10);
  --primary:#0f4c81; --primary2:#0b77bd; --green:#12834a; --yellow:#b77900; --red:#c93642; --blue:#1e6fd4;
}
body.light header{background:linear-gradient(135deg,#eaf3ff 0%,#cfe5ff 100%);border-bottom-color:#c9d7e8}
body.light h1, body.light .subtitle{color:#132238}

body.light .bottom-nav button{background:#fff;color:#132238;border-color:#cbd8e8}

body.light .pill{background:#edf4ff;color:#132238;border-color:#d8e2ef}
body.light .notice{background:#edf4ff;color:#132238;border-color:#cbd8e8}
body.light .venue, body.light .small, body.light .score-label, body.light .label{color:#53667f}

@media (max-width:640px){.calendar-match{grid-template-columns:58px 1fr}.calendar-actions{grid-column:1 / -1;justify-content:flex-start}.header-tools{align-items:flex-start}.theme-toggle{font-size:12px;padding:7px 10px}}


/* v10: correcciГіn de contraste en hero e Гӯcono integrado */
.hero{color:#edf3ff}
.hero h2,.hero .subtitle{color:#edf3ff!important}
.hero-icon{width:76px;height:76px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:linear-gradient(145deg,#0d1a2f,#0f4c81);border:1px solid rgba(255,255,255,.18);box-shadow:0 12px 30px rgba(0,0,0,.35);font-weight:900;text-align:center;line-height:1}
.hero-icon .ball{font-size:27px;line-height:1}
.hero-icon .mini{font-size:11px;letter-spacing:.2px;color:#fff}
body.light .hero{background:linear-gradient(135deg,#ffffff 0%,#eaf4ff 60%,#e9fff4 100%);border-color:#cbd8e8;color:#132238}

/* v11 preview: calendario mГЎs visual */
.day-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;margin:2px 0 10px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-chip{min-width:86px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:16px;padding:9px 10px;box-shadow:var(--shadow);cursor:pointer;text-align:left}
.day-chip.active{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(47,128,237,.18), var(--shadow)}
.day-chip.today{border-color:rgba(25,166,90,.55)}
.day-chip .dow{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.3px}
.day-chip .date{font-size:15px;font-weight:1000;margin-top:2px}
.day-chip .count{font-size:11px;color:var(--muted);margin-top:2px}
.day-summary{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}
.day-summary-main{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
.day-title{font-size:21px;font-weight:1000;margin:0}
.day-sub{color:var(--muted);font-size:13px;margin-top:4px}
.day-kpis{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.calendar-section{margin-top:14px}
.calendar-section-title{font-size:14px;font-weight:1000;color:var(--text);margin:0 0 8px;display:flex;align-items:center;gap:8px}

.calendar-relative{font-size:11px;color:var(--muted);margin-top:4px}

body.light .day-chip{background:#fff;color:#132238;border-color:#cbd8e8}

@media (max-width:640px){
  .day-chip{min-width:78px;padding:8px 9px}
  .day-title{font-size:18px}

}


/* v12: conservar posiciГіn de la barra de dГӯas */
.day-strip{scroll-behavior:smooth}
.day-chip.active{scroll-margin-inline:16px}

.day-strip{scroll-behavior:auto!important}

.locked-result{display:grid;gap:8px;padding:10px;border:1px solid var(--line);background:var(--card2);border-radius:14px}

.locked-team:last-child{border-bottom:0}.locked-team-name{font-weight:900}.locked-score{font-size:24px;font-weight:1000;min-width:38px;text-align:center}.locked-penalties{font-size:11px;color:var(--muted);text-align:right}.result-locked-note{font-size:11px;color:var(--muted);margin-top:7px}

/* v14 DEMO: navegaciГіn limpia con menГә lateral derecho */
header{z-index:30}
.header-inner{padding-top:11px;padding-bottom:11px}
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand-copy{min-width:0}.brand-copy h1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}

.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:2px 2px 12px;border-bottom:1px solid var(--line);margin-bottom:10px}
.drawer-title{font-size:19px;font-weight:1000}.drawer-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.drawer-close{width:40px;height:40px;padding:0;border-radius:12px;background:transparent;border:1px solid var(--line);box-shadow:none;font-size:20px}
.drawer-section-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:900;margin:14px 8px 7px}
.drawer-list{display:grid;gap:5px}.drawer-nav-btn,.drawer-action-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:1px solid transparent;box-shadow:none;padding:11px 12px;border-radius:13px;color:var(--text)}

function expandQuery(q){ const n=normalizeText(q); return SEARCH_ALIASES[n] || n; }
function levenshtein(a,b){
  a=normalizeText(a); b=normalizeText(b); if(!a || !b) return 999;
  const dp = Array.from({length:a.length+1}, (_,i)=>[i]);
  for(let j=1;j<=b.length;j++) dp[0][j]=j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++) dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[a.length][b.length];
}
function searchableTerms(){
  const terms = new Set();
  MATCHES.forEach(m => [m.team1,m.team2,m.sede,m.fase,m.grupo,m.partido].forEach(x => { if(x) terms.add(String(x)); }));
  Object.keys(SEARCH_ALIASES).forEach(x=>terms.add(x));
  return Array.from(terms).filter(x=>String(x).trim());
}
function getSearchSuggestion(q){
  const n = normalizeText(q); if(n.length < 3) return '';
  const terms = searchableTerms();
  const direct = terms.find(t => normalizeText(t) === n || normalizeText(t).includes(n));
  if(direct) return '';
  let best = null, bestScore = 999;
  for(const t of terms){
    const nt = normalizeText(t);
    const score = Math.min(levenshtein(n, nt), ...nt.split(' ').map(part => levenshtein(n, part)));
    if(score < bestScore){ bestScore = score; best = t; }
  }
  return best && bestScore <= 2 ? best : '';
}

function getMatchTeams(m, allocationSet){
  const r = res(m.id);
  const t1 = r.team1Override?.trim() || resolveLabel(m.team1, allocationSet) || m.team1;
  const t2 = r.team2Override?.trim() || resolveLabel(m.team2, allocationSet) || m.team2;
  return [t1,t2];
}
function getWinner(id){
  const m = matchById(id); if(!m) return '';
  const r = res(id); const g1=valNum(r.g1), g2=valNum(r.g2), p1=valNum(r.p1), p2=valNum(r.p2);
  if(g1===null || g2===null) return '';
  const [t1,t2] = getMatchTeams(m);
  if(g1 > g2) return t1;
  if(g2 > g1) return t2;
  if(!isGroup(m)){
    if(p1!==null && p2!==null){ if(p1>p2) return t1; if(p2>p1) return t2; }
    return '';
  }
  return 'Empate';
}
function getLoser(id){
  const m = matchById(id); if(!m) return '';
  const w = getWinner(id); if(!w || w==='Empate') return '';
  const [t1,t2] = getMatchTeams(m);
  return w === t1 ? t2 : t1;
}
function resolveLabel(label, allocationSet){
  if(!label) return '';
  let m = label.match(/^Ganador M(\d+)$/i); if(m) return getWinner(Number(m[1])) || label;
  m = label.match(/^Perdedor M(\d+)$/i); if(m) return getLoser(Number(m[1])) || label;
  m = label.match(/^([12])Вә Grupo ([A-L])$/i);
  if(m){ const rank = Number(m[1]); const g = m[2].toUpperCase(); return (getGroupTable(g)[rank-1] || {}).team || label; }
  m = label.match(/^3Вә Grupo ([A-L](?:\/[A-L])*)$/i);
  if(m){
    const allowed = m[1].split('/').map(x => x.toUpperCase());
    const thirds = getThirds().filter(x => allowed.includes(x.group) && x.team);
    for(const item of thirds){
      const key = item.group + '|' + item.team;
      if(allocationSet && allocationSet.has(key)) continue;
      if(allocationSet) allocationSet.add(key);
      return item.team || label;
    }
    return label;
  }
  return label;
}

function calcTables(){
  const byGroup = {};
  GROUPS.forEach(g => byGroup[g] = {});
  MATCHES.filter(isGroup).forEach(m => {
    [m.team1,m.team2].forEach(t => {
      if(!byGroup[m.grupo][t]) byGroup[m.grupo][t] = {group:m.grupo, team:t, pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0,pts:0};
    });
    const r = res(m.id); const g1=valNum(r.g1), g2=valNum(r.g2);
    if(g1===null || g2===null) return;
    const a = byGroup[m.grupo][m.team1], b = byGroup[m.grupo][m.team2];
    a.pj++; b.pj++; a.gf += g1; a.gc += g2; b.gf += g2; b.gc += g1; a.dg = a.gf-a.gc; b.dg = b.gf-b.gc;
    if(g1 > g2){ a.g++; b.p++; a.pts += 3; }
    else if(g2 > g1){ b.g++; a.p++; b.pts += 3; }
    else { a.e++; b.e++; a.pts++; b.pts++; }
  });
  const out = {};
  GROUPS.forEach(g => {
    out[g] = Object.values(byGroup[g]).sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.team.localeCompare(b.team));
  });
  return out;
}
function getGroupTable(g){ return calcTables()[g] || []; }
function getThirds(){
  const tables = calcTables();
  return GROUPS.map(g => ({...(tables[g][2] || {group:g, team:'', pj:0, pts:0, dg:0, gf:0}), group:g}))
    .sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.group.localeCompare(b.group));
}
function groupPlayedCount(g){ return MATCHES.filter(m => isGroup(m) && m.grupo === g && valNum(res(m.id).g1) !== null && valNum(res(m.id).g2) !== null).length; }
function playedMatches(){ return MATCHES.filter(m => valNum(res(m.id).g1) !== null && valNum(res(m.id).g2) !== null).length; }
function nextMatch(){ return MATCHES.find(m => valNum(res(m.id).g1) === null || valNum(res(m.id).g2) === null); }

function getFilteredMatches(){
  const fase = localStorage.getItem('filterFase') || 'Todos';
  const grupo = localStorage.getItem('filterGrupo') || 'Todos';
  const status = localStorage.getItem('statusFilter') || 'Todos';
  const qRaw = localStorage.getItem('filterSearch') || '';
  const q = expandQuery(qRaw);
  const favs = favorites().map(normalizeText);
  const list = MATCHES.filter(m => {
    const [t1,t2] = getMatchTeams(m, new Set());
    const text = normalizeText([m.partido, t1, t2, m.sede, m.fase, m.grupo].join(' '));
    const matchQ = !q || text.includes(q);
    const matchFase = (fase==='Todos'||m.fase===fase);
    const matchGrupo = (grupo==='Todos'||m.grupo===grupo);
    let matchStatus = true;
    if(status==='Pendientes') matchStatus = !hasResult(m) && !isOverdue(m);
    else if(status==='Jugados') matchStatus = hasResult(m);
    else if(status==='Vencidos') matchStatus = isOverdue(m);
    else if(status==='MГ©xico') matchStatus = normalizeText(t1).includes('mexico') || normalizeText(t2).includes('mexico');
    else if(status==='Favoritos') matchStatus = favs.length && (favs.includes(normalizeText(t1)) || favs.includes(normalizeText(t2)));
    return matchFase && matchGrupo && matchStatus && matchQ;
  });
  return {list, suggestion:getSearchSuggestion(qRaw)};
}

function localDateKey(d){

}

  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  const today = localDateKey(new Date());
  return dates.find(d=>d>=today) || dates[dates.length-1] || today;
}

  const nextIndex = Math.max(0, Math.min(dates.length - 1, index + step));

  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  setCalendarDate(dates.includes(key) ? key : calendarDefaultDate(), false);

function timeInfoForMatch(m){
  const now = new Date();
  const start = getDateTime(m.fecha, m.hora);
  const end = getEndDate(m);
  const mins = Math.round((start - now) / 60000);
  if(now >= start && now <= end) return {label:'EN JUEGO', cls:'en-vivo', rel:'El partido ya iniciГі'};
  if(now > end){
    const past = Math.round((now - end)/60000);
    if(past < 90) return {label:'TerminГі hace poco', cls:'vencido', rel:`TerminГі hace ${past} min aprox.`};
    return {label:'Ya pasГі', cls:'vencido', rel:`TerminГі hace ${Math.floor(past/60)} h aprox.`};
  }
  if(mins <= 90) return {label:'Por iniciar', cls:'en-vivo', rel:`Empieza en ${mins} min`};
  if(mins < 24*60) return {label:'Hoy', cls:'', rel:`Empieza en ${Math.floor(mins/60)} h ${mins%60} min`};
  return {label:'Programado', cls:'', rel:''};
}

function allGroupsComplete(){ return GROUPS.every(g => groupPlayedCount(g) >= 6); }

/*
  EliminaciГіn matemГЎtica conservadora:
  - prueba las 3 posibilidades de cada partido pendiente: gana local, empate o gana visitante;
  - calcula los puntos finales posibles;
  - cuando hay empate en puntos, usa los puntos obtenidos entre los equipos empatados;
  - si todavГӯa podrГӯa decidirse por diferencia de goles, goles, tarjetas o ranking,
    concede la posibilidad al equipo para evitar marcarlo rojo incorrectamente.
*/
const GROUP_ELIMINATION_CACHE = {};

function groupScenarioSignature(g){
  return MATCHES.filter(m => isGroup(m) && m.grupo === g)
    .map(m => {
      const r = res(m.id);
      const g1 = valNum(r.g1), g2 = valNum(r.g2);
      return `${m.id}:${g1===null?'':g1}-${g2===null?'':g2}`;
    }).join('|');
}

function getGroupEliminationMap(g){
  const signature = groupScenarioSignature(g);
  const cached = GROUP_ELIMINATION_CACHE[g];
  if(cached && cached.signature === signature) return cached.map;

  const matches = MATCHES.filter(m => isGroup(m) && m.grupo === g);
  const teams = Array.from(new Set(matches.flatMap(m => [m.team1,m.team2])));
  const points = Object.fromEntries(teams.map(t => [t,0]));
  const headToHead = Object.fromEntries(
    teams.map(t => [t,Object.fromEntries(teams.map(o => [o,0]))])
  );
  const pending = [];

  function addResult(team1, team2, outcome, factor){
    if(outcome === 0){
      points[team1] += 3 * factor;
      headToHead[team1][team2] += 3 * factor;
    } else if(outcome === 2){
      points[team2] += 3 * factor;
      headToHead[team2][team1] += 3 * factor;
    } else {
      points[team1] += 1 * factor;
      points[team2] += 1 * factor;
      headToHead[team1][team2] += 1 * factor;
      headToHead[team2][team1] += 1 * factor;
    }
  }

  matches.forEach(m => {
    const r = res(m.id);
    const g1 = valNum(r.g1), g2 = valNum(r.g2);
    if(g1 === null || g2 === null){
      pending.push(m);
      return;
    }
    addResult(m.team1, m.team2, g1 > g2 ? 0 : (g2 > g1 ? 2 : 1), 1);
  });

  const canFinishTopThree = Object.fromEntries(teams.map(t => [t,false]));

  function scenarioAllowsTopThree(team){
    const teamPoints = points[team];
    const teamsAbove = teams.filter(other => other !== team && points[other] > teamPoints).length;
    if(teamsAbove >= 3) return false;

    const availablePlaces = 3 - teamsAbove;
    const tiedTeams = teams.filter(other => points[other] === teamPoints);
    if(tiedTeams.length <= availablePlaces) return true;

    const miniPoints = {};
    tiedTeams.forEach(t => {
      miniPoints[t] = tiedTeams.reduce((sum,other) => {
        if(other === t) return sum;
        return sum + (headToHead[t][other] || 0);
      },0);
    });

    const tiedTeamsAbove = tiedTeams.filter(
      other => other !== team && miniPoints[other] > miniPoints[team]
    ).length;

    if(tiedTeamsAbove >= availablePlaces) return false;

    // Si los puntos de enfrentamientos directos no bastan para eliminarlo,
    // se considera que todavГӯa podrГӯa salvarse mediante los siguientes desempates.
    return true;
  }

  function evaluateScenario(){
    teams.forEach(team => {
      if(!canFinishTopThree[team] && scenarioAllowsTopThree(team)){
        canFinishTopThree[team] = true;
      }
    });
  }

  function explore(index){
    if(Object.values(canFinishTopThree).every(Boolean)) return;
    if(index >= pending.length){
      evaluateScenario();
      return;
    }

    const m = pending[index];
    for(let outcome=0; outcome<3; outcome++){
      addResult(m.team1, m.team2, outcome, 1);
      explore(index + 1);
      addResult(m.team1, m.team2, outcome, -1);
    }
  }

  explore(0);

  const eliminated = Object.fromEntries(
    teams.map(team => [team,!canFinishTopThree[team]])
  );

  GROUP_ELIMINATION_CACHE[g] = {signature, map:eliminated};
  return eliminated;
}

function groupRowStatusClass(g, rows, index){
  const row = rows[index];
  if(!row) return 'table-neutral';

  const tournamentGroupsComplete = allGroupsComplete();
  const groupComplete = groupPlayedCount(g) >= 6;
  const eliminatedMap = getGroupEliminationMap(g);

  if(eliminatedMap[row.team]) return 'table-eliminated';

  if(index < 2) return 'table-zone';

  if(index === 2){
    if(tournamentGroupsComplete){
      const thirdIndex = getThirds().findIndex(x => x.group === g && x.team === row.team);
      return thirdIndex >= 0 && thirdIndex < 8 ? 'table-zone' : 'table-eliminated';
    }
    return 'table-risk';
  }

  if(groupComplete) return 'table-eliminated';
  return 'table-neutral';
}

function thirdRowStatusClass(index){
  if(allGroupsComplete()) return index < 8 ? 'table-zone' : 'table-eliminated';
  return index < 8 ? 'table-zone' : 'table-risk';
}

function importProgress(file){
  const reader = new FileReader();
  reader.onload = () => { try{ const data=JSON.parse(reader.result); state=data.state || data || {}; saveState(); renderAll(); alert('Progreso importado.'); } catch(e){ alert('No pude leer ese archivo JSON.'); } };
  reader.readAsText(file);
}
function resetScores(){ if(confirm('ВҝBorrar todos los marcadores y notas guardados en este celular? Se conservarГЎn favoritos.')){ const keepPrefs = state.__prefs || {favorites:[], notified:[]}; state={__prefs:keepPrefs}; saveState(); renderAll(); } }

window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'inline-block'; });
document.getElementById('installBtn').onclick = async () => { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt = null; }};
document.getElementById('exportBtn').onclick = exportProgress;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = e => { if(e.target.files[0]) importProgress(e.target.files[0]); };
document.getElementById('resetBtn').onclick = resetScores;

if('serviceWorker' in navigator && location.protocol !== 'file:') navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
initTheme(); buildTabs(); applyUiPrefs(); const initialTab=uiPrefs().startTab||'home'; showTab(initialTab); loadVixLinksJson().finally(() => { renderAll(); notifyOverdue(); });
</script>
</body>
</html>

*{box-sizing:border-box}

body{min-height:100vh;}

.tab{border:1px solid var(--line); color:var(--text); background:#0d1a2f; padding:9px 12px; border-radius:999px; font-weight:700; white-space:nowrap; cursor:pointer}

.kpi{font-size:25px; font-weight:900}.label{color:var(--muted); font-size:12px; margin-top:3px}.section-title{font-size:18px; font-weight:900; margin:18px 0 10px}.row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}.spaced{justify-content:space-between}.pill{display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:800; border:1px solid var(--line); color:var(--text); background:#0d1a2f}.pill.green{background:rgba(25,166,90,.18); border-color:rgba(25,166,90,.55)}.pill.yellow{background:rgba(255,193,7,.18); border-color:rgba(255,193,7,.55); color:#ffe8a3}.pill.red{background:rgba(232,80,91,.18); border-color:rgba(232,80,91,.55)}.pill.blue{background:rgba(47,128,237,.18); border-color:rgba(47,128,237,.55)}

.group-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:12px}.group-card{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow)}.group-title{background:linear-gradient(135deg,#0f4c81,#1681c4); padding:11px 13px; font-weight:900}.table-wrap{overflow-x:auto}table{width:100%; border-collapse:collapse; font-size:13px}th,td{padding:8px 7px; border-bottom:1px solid var(--line); text-align:center}th{color:#dceaff; background:#0d1a2f; font-size:11px}td.team{text-align:left; font-weight:800}.rank1,.rank2{background:rgba(25,166,90,.12)}.rank3{background:rgba(255,193,7,.13)}.rank4{background:rgba(232,80,91,.10)}

.notice{border-left:5px solid var(--yellow); background:rgba(255,193,7,.12); padding:12px; border-radius:12px; color:#ffe8a3}.ok{border-left-color:var(--green); background:rgba(25,166,90,.12); color:#c5f5d8}.footer-bar{position:fixed; bottom:0; left:0; right:0; z-index:9; background:rgba(11,18,32,.96); border-top:1px solid var(--line); padding:10px 12px}.footer-inner{max-width:1200px; margin:auto; display:flex; gap:8px; overflow-x:auto}.footer-inner button{white-space:nowrap}.empty{padding:18px; text-align:center; color:var(--muted)}.jump-card{cursor:pointer; transition:transform .12s ease, border-color .12s ease; border-color:rgba(47,128,237,.65)}.jump-card:active{transform:scale(.99)}.match-card.jump-target{outline:3px solid var(--yellow); box-shadow:0 0 0 7px rgba(255,193,7,.18), var(--shadow)}
.hero{display:grid; gap:14px; grid-template-columns:76px 1fr; align-items:center; background:radial-gradient(circle at 10% 15%,rgba(255,193,7,.22),transparent 28%),linear-gradient(135deg,#10223b,#0b1220 62%,#063b2b); border:1px solid rgba(255,193,7,.30); border-radius:22px; padding:14px; box-shadow:var(--shadow); margin-bottom:14px}.hero img{width:76px;height:76px;border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,.35)}.hero h2{margin:0;font-size:21px}.hero .subtitle{font-size:13px}.mini-kpi{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}.quick-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px}.quick-row button{white-space:nowrap}.status-pending{border-left-color:var(--blue)}.status-played{border-left-color:var(--green)}.status-overdue{border-left-color:var(--red)}.fav-btn{background:transparent; border:1px solid var(--line); box-shadow:none; padding:6px 8px; border-radius:10px; min-width:38px}.fav-btn.active{background:rgba(255,193,7,.20); border-color:rgba(255,193,7,.65); color:#ffe8a3}.team-click{cursor:pointer}.team-click:hover{text-decoration:underline}.note-box{width:100%; min-height:44px; resize:vertical; background:var(--input); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:9px; font-family:inherit}.match-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}.warning-card{border-color:rgba(232,80,91,.55); background:rgba(232,80,91,.10)}.team-summary{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px}.summary-num{font-size:24px; font-weight:900}.bottom-nav{position:fixed; bottom:70px; left:12px; right:12px; max-width:560px; margin:auto; display:flex; gap:6px; justify-content:center; z-index:8; pointer-events:none}.bottom-nav button{pointer-events:auto; padding:8px 10px; border-radius:999px; font-size:12px; background:#15233a; box-shadow:0 8px 22px rgba(0,0,0,.28)}.bottom-nav button.active{background:var(--primary2)}@media (max-width:520px){.footer-bar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}.footer-inner button{font-size:12px; padding:9px}.hero{grid-template-columns:62px 1fr}.hero img{width:62px;height:62px;border-radius:16px}.hero h2{font-size:18px}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.card{padding:12px}.kpi{font-size:22px}.match-actions button{flex:1}.filters{grid-template-columns:1fr}.team-row{grid-template-columns:minmax(0,1fr) 54px 54px}.score{width:54px}}

@media (min-width:700px){h1{font-size:24px}.filters{grid-template-columns:1fr 180px 180px}.filters input{grid-column:auto}.team-row{grid-template-columns:minmax(0,1fr) 64px 64px}.score{width:64px}.header-inner{padding-left:18px; padding-right:18px}main{padding:20px 18px 92px}}

/* v8: enlaces ViX externos con vix_links.json */

function applyVixLinksJson(data) {
  const src = data && data.links ? data.links : data;
  if(!src || typeof src !== 'object') return false;
  const live = {};
  const summary = {};
  Object.keys(src).forEach(id => {
    const entry = src[id];
    if(typeof entry === 'string') {
      if(entry) live[String(id)] = entry;
      return;
    }
    if(entry && typeof entry === 'object') {
      if(entry.live) live[String(id)] = String(entry.live).trim();
      if(entry.summary) summary[String(id)] = String(entry.summary).trim();
    }
  });
  VIX_LINKS = live;
  VIX_SUMMARY_LINKS = summary;
  VIX_LINKS_SOURCE = 'vix_links.json';
  return true;
}
async function loadVixLinksJson() {
  if(location.protocol === 'file:') return false;
  try {
    const response = await fetch('./vix_links.json', {cache:'no-store'});
    if(!response.ok) return false;
    const data = await response.json();
    return applyVixLinksJson(data);
  } catch(err) {
    console.warn('No se pudo cargar vix_links.json; usando enlaces integrados.', err);
    return false;
  }
}

function expandQuery(q){ const n=normalizeText(q); return SEARCH_ALIASES[n] || n; }
function levenshtein(a,b){
  a=normalizeText(a); b=normalizeText(b); if(!a || !b) return 999;
  const dp = Array.from({length:a.length+1}, (_,i)=>[i]);
  for(let j=1;j<=b.length;j++) dp[0][j]=j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++) dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[a.length][b.length];
}
function searchableTerms(){
  const terms = new Set();
  MATCHES.forEach(m => [m.team1,m.team2,m.sede,m.fase,m.grupo,m.partido].forEach(x => { if(x) terms.add(String(x)); }));
  Object.keys(SEARCH_ALIASES).forEach(x=>terms.add(x));
  return Array.from(terms).filter(x=>String(x).trim());
}
function getSearchSuggestion(q){
  const n = normalizeText(q); if(n.length < 3) return '';
  const terms = searchableTerms();
  const direct = terms.find(t => normalizeText(t) === n || normalizeText(t).includes(n));
  if(direct) return '';
  let best = null, bestScore = 999;
  for(const t of terms){
    const nt = normalizeText(t);
    const score = Math.min(levenshtein(n, nt), ...nt.split(' ').map(part => levenshtein(n, part)));
    if(score < bestScore){ bestScore = score; best = t; }
  }
  return best && bestScore <= 2 ? best : '';
}

function getMatchTeams(m, allocationSet){
  const r = res(m.id);
  const t1 = r.team1Override?.trim() || resolveLabel(m.team1, allocationSet) || m.team1;
  const t2 = r.team2Override?.trim() || resolveLabel(m.team2, allocationSet) || m.team2;
  return [t1,t2];
}
function getWinner(id){
  const m = matchById(id); if(!m) return '';
  const r = res(id); const g1=valNum(r.g1), g2=valNum(r.g2), p1=valNum(r.p1), p2=valNum(r.p2);
  if(g1===null || g2===null) return '';
  const [t1,t2] = getMatchTeams(m);
  if(g1 > g2) return t1;
  if(g2 > g1) return t2;
  if(!isGroup(m)){
    if(p1!==null && p2!==null){ if(p1>p2) return t1; if(p2>p1) return t2; }
    return '';
  }
  return 'Empate';
}
function getLoser(id){
  const m = matchById(id); if(!m) return '';
  const w = getWinner(id); if(!w || w==='Empate') return '';
  const [t1,t2] = getMatchTeams(m);
  return w === t1 ? t2 : t1;
}
function resolveLabel(label, allocationSet){
  if(!label) return '';
  let m = label.match(/^Ganador M(\d+)$/i); if(m) return getWinner(Number(m[1])) || label;
  m = label.match(/^Perdedor M(\d+)$/i); if(m) return getLoser(Number(m[1])) || label;
  m = label.match(/^([12])º Grupo ([A-L])$/i);
  if(m){ const rank = Number(m[1]); const g = m[2].toUpperCase(); return (getGroupTable(g)[rank-1] || {}).team || label; }
  m = label.match(/^3º Grupo ([A-L](?:\/[A-L])*)$/i);
  if(m){
    const allowed = m[1].split('/').map(x => x.toUpperCase());
    const thirds = getThirds().filter(x => allowed.includes(x.group) && x.team);
    for(const item of thirds){
      const key = item.group + '|' + item.team;
      if(allocationSet && allocationSet.has(key)) continue;
      if(allocationSet) allocationSet.add(key);
      return item.team || label;
    }
    return label;
  }
  return label;
}

function calcTables(){
  const byGroup = {};
  GROUPS.forEach(g => byGroup[g] = {});
  MATCHES.filter(isGroup).forEach(m => {
    [m.team1,m.team2].forEach(t => {
      if(!byGroup[m.grupo][t]) byGroup[m.grupo][t] = {group:m.grupo, team:t, pj:0,g:0,e:0,p:0,gf:0,gc:0,dg:0,pts:0};
    });
    const r = res(m.id); const g1=valNum(r.g1), g2=valNum(r.g2);
    if(g1===null || g2===null) return;
    const a = byGroup[m.grupo][m.team1], b = byGroup[m.grupo][m.team2];
    a.pj++; b.pj++; a.gf += g1; a.gc += g2; b.gf += g2; b.gc += g1; a.dg = a.gf-a.gc; b.dg = b.gf-b.gc;
    if(g1 > g2){ a.g++; b.p++; a.pts += 3; }
    else if(g2 > g1){ b.g++; a.p++; b.pts += 3; }
    else { a.e++; b.e++; a.pts++; b.pts++; }
  });
  const out = {};
  GROUPS.forEach(g => {
    out[g] = Object.values(byGroup[g]).sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.team.localeCompare(b.team));
  });
  return out;
}
function getGroupTable(g){ return calcTables()[g] || []; }

}

    const matchGrupo = (grupo==='Todos'||m.grupo===grupo);
    let matchStatus = true;
    if(status==='Pendientes') matchStatus = !hasResult(m) && !isOverdue(m);
    else if(status==='Jugados') matchStatus = hasResult(m);
    else if(status==='Vencidos') matchStatus = isOverdue(m);
    else if(status==='México') matchStatus = normalizeText(t1).includes('mexico') || normalizeText(t2).includes('mexico');
    else if(status==='Favoritos') matchStatus = favs.length && (favs.includes(normalizeText(t1)) || favs.includes(normalizeText(t2)));
    return matchFase && matchGrupo && matchStatus && matchQ;
  });
  return {list, suggestion:getSearchSuggestion(qRaw)};
}

function localDateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function calendarDefaultDate(){
  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  const today = localDateKey(new Date());
  return dates.find(d=>d>=today) || dates[dates.length-1] || today;
}
function setCalendarDate(date, preserveStripPosition=false){
  const currentStrip = document.querySelector('#calendar .day-strip');
  if(currentStrip) calendarStripScrollLeft = currentStrip.scrollLeft;
  calendarPreserveStripPosition = preserveStripPosition;
  localStorage.setItem('calendarDate', date);
  renderCalendar();
}

function changeCalendarDay(step){
  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  const current = localStorage.getItem('calendarDate') || calendarDefaultDate();
  const index = dates.indexOf(current);
  const nextIndex = Math.max(0, Math.min(dates.length - 1, index + step));
  setCalendarDate(dates[nextIndex], false);
}

function setCalendarToToday(){
  const today = localDateKey(new Date());
  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  setCalendarDate(dates.includes(today) ? today : calendarDefaultDate(), false);
}
function setCalendarToTomorrow(){
  const t = new Date(); t.setDate(t.getDate()+1);
  const key = localDateKey(t);
  const dates = Array.from(new Set(MATCHES.map(m=>m.fecha))).sort();
  setCalendarDate(dates.includes(key) ? key : calendarDefaultDate(), false);
}

function timeInfoForMatch(m){
  const now = new Date();
  const start = getDateTime(m.fecha, m.hora);
  const end = getEndDate(m);
  const mins = Math.round((start - now) / 60000);
  if(now >= start && now <= end) return {label:'EN JUEGO', cls:'en-vivo', rel:'El partido ya inició'};
  if(now > end){
    const past = Math.round((now - end)/60000);
    if(past < 90) return {label:'Terminó hace poco', cls:'vencido', rel:`Terminó hace ${past} min aprox.`};
    return {label:'Ya pasó', cls:'vencido', rel:`Terminó hace ${Math.floor(past/60)} h aprox.`};
  }
  if(mins <= 90) return {label:'Por iniciar', cls:'en-vivo', rel:`Empieza en ${mins} min`};
  if(mins < 24*60) return {label:'Hoy', cls:'', rel:`Empieza en ${Math.floor(mins/60)} h ${mins%60} min`};
  return {label:'Programado', cls:'', rel:''};
}

  document.getElementById('team').innerHTML = `<div class="card"><div class="row spaced"><h2 style="margin:0">Resumen de selección</h2><button class="fav-btn ${isFavorite(team)?'active':''}" onclick="toggleFavorite(event,'${jsStr(team)}')">${isFavorite(team)?'⭐ Favorito':'☆ Favorito'}</button></div><select style="width:100%;margin-top:10px" id="teamSelect">${teams.map(t=>`<option ${t===team?'selected':''}>${escapeHtml(t)}</option>`).join('')}</select></div>
  <div class="team-summary" style="margin-top:12px"><div class="card"><div class="summary-num">Grupo ${escapeHtml(tableRow.group)}</div><div class="label">Grupo</div></div><div class="card"><div class="summary-num">${tableRow.pts}</div><div class="label">Puntos</div></div><div class="card"><div class="summary-num">${tableRow.dg}</div><div class="label">Diferencia</div></div><div class="card"><div class="summary-num">${tableRow.gf}</div><div class="label">Goles a favor</div></div></div>
  <div class="section-title">Partidos de ${escapeHtml(team)}</div><div class="match-list">${teamMatches.map(m=>{ const [t1,t2]=getMatchTeams(m,new Set()); const r=res(m.id); const [lab,col]=statusLabel(m); return `<div class="card jump-card" onclick="jumpToMatch(${m.id})"><div class="row spaced"><strong>M${m.id} · ${escapeHtml(m.fase)}</strong><span class="pill ${col}">${lab}</span></div><div style="font-weight:900;margin-top:8px">${escapeHtml(t1)} ${r.g1??'—'} - ${r.g2??'—'} ${escapeHtml(t2)}</div><div class="venue">${formatDate(m.fecha)} · ${m.hora} · ${escapeHtml(m.sede)}</div>${r.note?`<div class="small" style="margin-top:6px">📝 ${escapeHtml(r.note)}</div>`:''}</div>`}).join('')}</div>`;
  const sel=document.getElementById('teamSelect'); if(sel) sel.onchange=e=>{ localStorage.setItem('selectedTeam', e.target.value); renderTeam(); };
}

function renderHelp(){
  const fileMode = location.protocol === 'file:';
  document.getElementById('help').innerHTML = `<div class="grid">
    <div class="card"><h2>Cómo usarla</h2><ol><li>Entra a <strong>Partidos</strong>.</li><li>Captura <strong>G</strong> para goles de cada equipo.</li><li>En eliminatorias, si empatan, captura <strong>P</strong> para penales.</li><li>Usa <strong>Calendario</strong>, <strong>Grupos</strong>, <strong>Mejores 3º</strong>, <strong>Llave</strong> y <strong>Selección</strong> para revisar avances.</li><li>Desde <strong>Inicio</strong>, toca <strong>Próximo pendiente</strong> para ir directo al marcador.</li></ol></div>
    <div class="card"><h2>Filtros y favoritos</h2><p>En <strong>Partidos</strong> puedes filtrar por pendientes, jugados, vencidos, México y favoritos. El buscador ignora mayúsculas, minúsculas y acentos; también entiende abreviaciones como USA, EEUU, MEX, KOR, BRA, etc. Si escribes algo parecido, la app puede sugerir <strong>¿Quisiste decir...?</strong>.</p><p>Toca ☆ para marcar un equipo favorito. Toca el nombre de un equipo para ver su resumen.</p></div>
    <div class="card"><h2>ViX, búsqueda y borrado individual</h2><p>Si un partido tiene enlace en vivo, <strong>📺 Ver en ViX</strong> aparece desde 1 hora y media antes del inicio hasta 2 horas y media después. Pasado ese tiempo, si hay enlace de resumen, cambia a <strong>🎬 Ver resumen en ViX</strong>. <strong>🔎 Buscar resultado</strong> aparece solo cuando el partido ya inició y abre Google con una búsqueda limpia para intentar mostrar el marcador grande.</p><p>Puedes cambiar entre modo claro y oscuro desde el botón superior. Cada partido tiene una nota opcional. También puedes usar <strong>Borrar este partido</strong> para limpiar solo ese marcador sin borrar todo.</p></div>
    <div class="card"><h2>Recordatorios</h2><p>La app muestra partidos vencidos sin resultado en Inicio y en el filtro <strong>Vencidos</strong>. También puedes activar avisos del navegador.</p><button onclick="requestNotifications()">🔔 Permitir avisos mientras uso la app</button><p class="small">Importante: en una app web, los avisos no son tan fuertes como una alarma de Android. Si la app está cerrada, puede que no avise hasta que la abras otra vez.</p></div>
    <div class="card"><h2>Botones de respaldo</h2><p><strong>⬇️ Descargar progreso:</strong> guarda tus marcadores, favoritos y notas en un archivo JSON.</p><p><strong>⬆️ Cargar progreso:</strong> recupera un respaldo guardado.</p><p><strong>Borrar marcadores:</strong> limpia marcadores y notas, pero conserva favoritos.</p></div>
    <div class="card"><h2>Instalación en Android</h2>${fileMode ? '<div class="notice">Estás abriendo la app como archivo local. Así funciona para usarla, pero para instalarla como PWA con icono y modo app conviene publicarla en HTTPS, por ejemplo GitHub Pages o Netlify.</div>' : '<div class="ok notice">Cuando esté publicada en HTTPS, usa el botón Instalar o en Chrome: menú ⋮ → Agregar a pantalla principal / Instalar app.</div>'}</div>
    <div class="card"><h2>Importante sobre terceros</h2><p>Los cruces de mejores terceros dependen de la combinación oficial de grupos clasificados. La app los sugiere automáticamente, pero puedes editar los equipos de cada partido de eliminatoria en Partidos.</p></div>
  </div>`;
}
function renderAll(){ renderHome(); if(document.getElementById('matches').classList.contains('active')) renderMatches(); if(document.getElementById('calendar').classList.contains('active')) renderCalendar(); renderGroups(); renderThirds(); renderBracket(); renderTeam(); renderHelp(); }

function exportProgress(){
  const blob = new Blob([JSON.stringify({app:'Mundial 2026 Control Monterrey', version:13, exportedAt:new Date().toISOString(), state}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mundial_2026_progreso.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importProgress(file){
  const reader = new FileReader();
  reader.onload = () => { try{ const data=JSON.parse(reader.result); state=data.state || data || {}; saveState(); renderAll(); alert('Progreso importado.'); } catch(e){ alert('No pude leer ese archivo JSON.'); } };
  reader.readAsText(file);
}
function resetScores(){ if(confirm('¿Borrar todos los marcadores y notas guardados en este celular? Se conservarán favoritos.')){ const keepPrefs = state.__prefs || {favorites:[], notified:[]}; state={__prefs:keepPrefs}; saveState(); renderAll(); } }

window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'inline-block'; });
document.getElementById('installBtn').onclick = async () => { if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt = null; }};
document.getElementById('exportBtn').onclick = exportProgress;
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = e => { if(e.target.files[0]) importProgress(e.target.files[0]); };
document.getElementById('resetBtn').onclick = resetScores;

if('serviceWorker' in navigator && location.protocol !== 'file:') navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
initTheme(); buildTabs(); renderAll(); loadVixLinksJson().finally(() => { renderAll(); notifyOverdue(); });
</script>
</body>
</html>
